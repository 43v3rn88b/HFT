<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFT Live Order Book</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        h1 { margin-bottom: 5px; }
        #status {
            font-size: 0.9em;
            color: #8b949e;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 40px;
            background: #161b22;
            padding: 20px 40px;
            border-radius: 10px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .column { width: 250px; }
        h3 { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: right; }
        th { color: #8b949e; font-size: 0.85em; font-weight: normal; }
        th:first-child, td:first-child { text-align: left; }
        
        /* Exchange Colors */
        .bid-row td { color: #3fb950; font-weight: bold; } /* Green for Bids */
        .ask-row td { color: #f85149; font-weight: bold; } /* Red for Asks */
        .empty-state { text-align: center; color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <h1 id="ticker-header">Loading Ticker...</h1>
    <div id="status">🔴 Disconnected</div>

    <div class="container">
        <div class="column">
            <h3>Bids (Buy)</h3>
            <table>
                <thead><tr><th>Size</th><th>Price ($)</th></tr></thead>
                <tbody id="bids-body">
                    <tr><td colspan="2" class="empty-state">Waiting for data...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="column">
            <h3>Asks (Sell)</h3>
            <table>
                <thead><tr><th>Price ($)</th><th>Size</th></tr></thead>
                <tbody id="asks-body">
                    <tr><td colspan="2" class="empty-state">Waiting for data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Connect to your Go API Gateway
        const ws = new WebSocket("ws://172.30.85.187:8082/ws/orderbook");
        const statusEl = document.getElementById("status");
        const tickerEl = document.getElementById("ticker-header");
        const bidsBody = document.getElementById("bids-body");
        const asksBody = document.getElementById("asks-body");

        ws.onopen = () => {
            statusEl.innerHTML = "🟢 Connected to Go Gateway";
        };

        ws.onclose = () => {
            statusEl.innerHTML = "🔴 Disconnected. Is the Go server running?";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            tickerEl.innerText = `${data.ticker} Order Book`;

            // Helper function to render rows
            const renderRows = (levels, type) => {
                if (!levels || levels.length === 0) {
                    return `<tr><td colspan="2" class="empty-state">No ${type}</td></tr>`;
                }
                return levels.map(level => {
                    const priceFormatted = (level.price / 100).toFixed(2); // Convert cents to dollars
                    if (type === 'bids') {
                        return `<tr class="bid-row"><td>${level.qty}</td><td>${priceFormatted}</td></tr>`;
                    } else {
                        return `<tr class="ask-row"><td>${priceFormatted}</td><td>${level.qty}</td></tr>`;
                    }
                }).join('');
            };

            bidsBody.innerHTML = renderRows(data.bids, 'bids');
            asksBody.innerHTML = renderRows(data.asks, 'asks');
        };
    </script>
</body>
</html>
